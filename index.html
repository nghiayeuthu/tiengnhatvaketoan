<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TiengNhatVaKeToan - Học tiếng Nhật và kế toán</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="locked">
    <section class="auth-gate" id="authGate" aria-labelledby="authTitle">
      <form class="auth-card" id="authForm">
        <p class="eyebrow">Private Study</p>
        <h1 id="authTitle">Nhập mật khẩu</h1>
        <label class="auth-label" for="sitePassword">Mật khẩu truy cập</label>
        <input class="auth-input" id="sitePassword" type="password" autocomplete="current-password" inputmode="numeric" required />
        <p class="auth-error" id="authError" hidden>Mật khẩu chưa đúng.</p>
        <button class="primary-button" type="submit">Vào học</button>
      </form>
    </section>

    <header class="topbar">
      <a class="brand" href="#" aria-label="TiengNhatVaKeToan">
        <span class="brand-mark">日計</span>
        <span>
          <strong>TiengNhatVaKeToan</strong>
          <small>Japanese & Boki practice</small>
        </span>
      </a>
      <nav class="nav" aria-label="Điều hướng chính">
        <a href="#practice">Luyện đề N1</a>
        <a href="#boki">Boki 3級</a>
        <a href="#deck">Flashcards</a>
      </nav>
      <button class="ghost-button" id="resetProgress" type="button">Làm mới tiến độ</button>
    </header>

    <main>
      <section class="section app-view" id="practice" data-view="practice">
        <div class="section-heading">
          <p class="eyebrow">Practice</p>
          <div class="filters" role="group" aria-label="Chọn kỹ năng">
            <button class="filter active" type="button" data-filter="all">Tất cả</button>
            <button class="filter" type="button" data-filter="vocab">Từ vựng</button>
            <button class="filter" type="button" data-filter="grammar">Ngữ pháp</button>
          </div>
        </div>

        <article class="quiz-shell">
          <div class="quiz-top">
            <div>
              <p class="quiz-type" id="questionType">Từ vựng</p>
              <h3 id="questionText">Đang tải câu hỏi...</h3>
            </div>
            <span class="pill" id="questionCount">1/1</span>
          </div>
          <div class="passage" id="passage" hidden></div>
          <div class="answers" id="answers"></div>
          <div class="feedback" id="feedback" hidden></div>
          <div class="question-jump" id="questionJump" hidden></div>
          <div class="quiz-actions">
            <button class="secondary-button" id="backToFolders" type="button" hidden>Chọn thư mục để luyện đề</button>
            <button class="secondary-button" id="prevQuestion" type="button">Câu trước</button>
            <button class="primary-button" id="nextQuestion" type="button">Câu tiếp</button>
          </div>
        </article>
      </section>

      <section class="section two-column app-view" id="deck" data-view="deck">
        <div class="deck-grid" id="deckGrid"></div>
      </section>

      <section class="section two-column app-view" id="boki" data-view="boki">
        <article class="quiz-shell">
          <div class="quiz-top">
            <div>
              <p class="quiz-type" id="bokiQuestionType">Boki 3級</p>
              <h3 id="bokiQuestionText">Chọn thư mục luyện đề Boki</h3>
            </div>
            <span class="pill" id="bokiQuestionCount">0/0</span>
          </div>
          <div class="passage" id="bokiPassage" hidden></div>
          <div class="answers" id="bokiAnswers"></div>
          <div class="feedback" id="bokiFeedback" hidden></div>
          <div class="question-jump" id="bokiQuestionJump" hidden></div>
          <div class="quiz-actions">
            <button class="secondary-button" id="bokiBackToFolders" type="button" hidden>Chọn thư mục luyện đề Boki</button>
            <button class="secondary-button" id="bokiPrevQuestion" type="button">Câu trước</button>
            <button class="primary-button" id="bokiNextQuestion" type="button">Câu tiếp</button>
          </div>
        </article>
      </section>

    </main>

    <footer class="footer">
      <p>Made for personal Japanese and Boki practice.</p>
    </footer>

    <script src="n1-vocabulary-extra.js?v=4"></script>
    <script src="n1-grammar-extra.js?v=1"></script>
    <script src="script-dynamic-all-exams-v12.js?v=52"></script>
  </body>
</html>
